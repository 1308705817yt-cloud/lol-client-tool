name: tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile sources
        run: python -m py_compile main.py shared.py utils.py match_utils.py game_input.py quick_chat.py lcu_core.py gui.py
      - name: Run tests
        run: python -m unittest discover -v
